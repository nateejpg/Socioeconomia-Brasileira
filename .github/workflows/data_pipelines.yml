name: Orquestrador de Dados (Socioeconomia Brasileira)

on:
  workflow_dispatch: # Mantém o botão manual para testes
    inputs:
      pipeline_name:
        description: 'Qual pipeline rodar?'
        required: true
        default: 'ipca'
        type: choice
        options:
          - ipca
          - selic
          - pib
          - bolsa_familia

  schedule:
    - cron: '0 13 12 * *'        # IPCA: Todo dia 12 de cada mês às 13:00 UTC (10:00 BRT)
    - cron: '0 13 * * 4'         # Selic: Toda Quinta-feira às 13:00 UTC (10:00 BRT)
    - cron: '0 13 10 3,6,9,12 *' # PIB: Dia 10 de Mar, Jun, Set e Dez às 13:00 UTC (10:00 BRT)
    - cron: '0 13 20 * *'        # Bolsa Família: Todo dia 20 de cada mês às 13:00 UTC (10:00 BRT)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      # ... [MANTENHA AQUI SEUS PASSOS DE CHECKOUT, PYTHON E AWS DO ARQUIVO ANTERIOR] ...

      # ---------------------------------------------------------
      # 1. IPCA (Mensal)
      # ---------------------------------------------------------
      - name: Executar Pipeline do IPCA
        if: github.event.schedule == '0 13 12 * *'
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python -c "from orchestrators.ipca_pipeline import run_pipeline; run_pipeline()"

      # ---------------------------------------------------------
      # 2. SELIC (Semanal)
      # ---------------------------------------------------------
      - name: Executar Pipeline da Selic
        if: github.event.schedule == '0 13 * * 4'
        env:
          DB_USER: ${{ secrets.DB_USER }}
          # ... (copie as mesmas envs aqui)
        run: python -c "from orchestrators.selic_pipeline import run_pipeline; run_pipeline()"

      # ---------------------------------------------------------
      # 3. PIB (Trimestral)
      # ---------------------------------------------------------
      - name: Executar Pipeline do PIB
        if: github.event.schedule == '0 13 10 3,6,9,12 *'
        env:
          DB_USER: ${{ secrets.DB_USER }}
          # ... (copie as mesmas envs aqui)
        run: python -c "from orchestrators.pib_pipeline import run_pipeline; run_pipeline()"

      # ---------------------------------------------------------
      # 4. BOLSA FAMÍLIA (Mensal)
      # ---------------------------------------------------------
      - name: Executar Pipeline do Bolsa Família
        if: github.event.schedule == '0 13 20 * *'
        env:
          DB_USER: ${{ secrets.DB_USER }}
          # ... (copie as mesmas envs aqui)
        run: python -c "from orchestrators.bolsa_familia_pipeline import run_pipeline; run_pipeline()"

      # ... [MANTENHA AQUI O PASSO MANUAL (WORKFLOW DISPATCH) DO ARQUIVO ANTERIOR] ...