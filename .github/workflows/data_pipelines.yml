name: Orquestrador de Dados (Socioeconomia Brasileira)

on:
  workflow_dispatch:
    inputs:
      pipeline_name:
        description: 'Qual pipeline rodar?'
        required: true
        default: 'ipca'
        type: choice
        options:
          - ipca
          - selic
          - pib
          - bolsa_familia

  schedule:
    - cron: '0 13 12 * *'        # IPCA: Todo dia 12 de cada mês
    - cron: '0 13 * * 4'         # Selic: Toda Quinta-feira 
    - cron: '0 13 10 3,6,9,12 *' # PIB: Dia 10 de Mar, Jun, Set e Dez
    - cron: '0 13 20 * *'        # Bolsa Família: Todo dia 20 de cada mês 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      # --- PREPARAÇÃO DO AMBIENTE ---
      - name: Clonar o Repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurar Credenciais da AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # --- 1. IPCA (Mensal) ---
      - name: Executar Pipeline do IPCA
        if: github.event.schedule == '0 13 12 * *'
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python -c "from orchestrators.ipca_pipeline import run_pipeline; run_pipeline()"

      # --- 2. SELIC (Semanal) ---
      - name: Executar Pipeline da Selic
        if: github.event.schedule == '0 13 * * 4'
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python -c "from orchestrators.selic_pipeline import run_pipeline; run_pipeline()"

      # --- 3. PIB (Trimestral) ---
      - name: Executar Pipeline do PIB
        if: github.event.schedule == '0 13 10 3,6,9,12 *'
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python -c "from orchestrators.pib_pipeline import run_pipeline; run_pipeline()"

      # --- 4. BOLSA FAMÍLIA (Mensal) ---
      - name: Executar Pipeline do Bolsa Família
        if: github.event.schedule == '0 13 20 * *'
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python -c "from orchestrators.bolsa_familia_pipeline import run_pipeline; run_pipeline()"

      # --- 5. EXECUÇÃO MANUAL (O botão que você clicou) ---
      - name: Executar Pipeline Selecionado (Manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "Iniciando pipeline: ${{ inputs.pipeline_name }}"
          python -c "from orchestrators.${{ inputs.pipeline_name }}_pipeline import run_pipeline; run_pipeline()"